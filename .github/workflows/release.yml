name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: vgc-linux-x86_64.tar.gz
          # macOS does not support fully static binaries; the binary links
          # against libSystem.dylib which is guaranteed present on all macOS installs.
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: vgc-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: vgc-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.92.0'
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/vgc vgc
          tar -czf ${{ matrix.archive }} vgc
          rm vgc

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "target\${{ matrix.target }}\release\vgc.exe" "vgc.exe"
          Compress-Archive -Path vgc.exe -DestinationPath ${{ matrix.archive }}
          Remove-Item vgc.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            vgc-linux-x86_64.tar.gz
            vgc-macos-aarch64.tar.gz
            vgc-windows-x86_64.zip
          generate_release_notes: true
